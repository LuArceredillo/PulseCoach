name: pulsecoach
description: A Flutter app that connects to Polar heart rate monitors via BLE for interval training.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.20.0
  sqlite3_flutter_libs: ^0.5.24
  path_provider: ^2.1.5
  path: ^1.9.1
  flutter_riverpod: ^2.6.1
  flutter_blue_plus: ^1.36.8
  permission_handler: ^11.4.0
  flutter_tts: ^4.2.5
  rxdart: ^0.27.7
  intl: ^0.19.0
  flutter_animate: ^4.5.2
  fl_chart: ^0.66.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  drift_dev: ^2.20.0
  build_runner: ^2.4.13

flutter:
  uses-material-design: true

  fonts:
    - family: Orbitron
      fonts:
        - asset: fonts/Orbitron-Regular.ttf
        - asset: fonts/Orbitron-Bold.ttf
          weight: 700
